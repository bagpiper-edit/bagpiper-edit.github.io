# ---------- abstract ----------
abstract: |
  Current text-guided audio editing methods rely on paired training data, predefined operation templates, and separate processing pipelines across speech, music, and sound.
  We present Bagpiper-Edit to enable open-ended audio editing via free-form natural language instructions.
  We reformulate audio editing as a rich-caption rewriting task by treating a rich caption as the semantic representation of an audio clip.
  The user request is translated into an edited caption, which then guides Bagpiper-Edit to generate the target edited audio with the original audio as contextual acoustic anchor.
  This unlocks the potential of free-form editing, and circumvents the need for paired audio-editing training data, enabling powerful zero-shot editing capabilities.
  Evaluations across speech, audio, and free-form editing show Bagpiper-Edit maintains good consistency to the original audio and achieves similar performance to other expert models in most cases.

# ---------- demo sections ----------
sections:
  # ================================================================
  #  SPEECH EDITING
  # ================================================================
  - id: speech
    title: "Speech Editing"
    description: "Editing operations that modify the spoken content, speaking style, or emotion of a speech utterance."
    subsections:

      # --- Transcription: Deletion ---
      - id: transcription_del
        title: "Transcription — Deletion"
        description: "Remove specific words or phrases from the utterance while keeping the rest natural."
        instruction_col: true          # show an "Instruction" column
        samples:
          - id: del_001
            instruction: 'Delete the word "nothing"'
            text: "but anders cared nothing about that"
            audios:
              source:        "audios/speech/transcription_del/del_001_source.wav"
              bagpiper_base: "audios/speech/transcription_del/del_001_bagpiper_base.wav"
              bagpiper_st:   "audios/speech/transcription_del/del_001_bagpiper_st.wav"
              bagpiper_mt:   "audios/speech/transcription_del/del_001_bagpiper_mt.wav"
              cosyvoice3:  "audios/speech/transcription_del/del_001_cosyvoice3.wav"
              stepaudiox:  "audios/speech/transcription_del/del_001_stepaudiox.wav"
              minguniaudio: "audios/speech/transcription_del/del_001_minguniaudio.wav"

      # --- Transcription: Insertion ---
      - id: transcription_ins
        title: "Transcription — Insertion"
        description: "Insert new words or phrases into the utterance at the designated position."
        instruction_col: true
        samples:
          - id: ins_001
            instruction: 'Insert "really" before "cared"'
            text: "but anders cared nothing about that"
            audios:
              source:        "audios/speech/transcription_ins/ins_001_source.wav"
              bagpiper_base: "audios/speech/transcription_ins/ins_001_bagpiper_base.wav"
              bagpiper_st:   "audios/speech/transcription_ins/ins_001_bagpiper_st.wav"
              bagpiper_mt:   "audios/speech/transcription_ins/ins_001_bagpiper_mt.wav"

      # --- Transcription: Substitution ---
      - id: transcription_sub
        title: "Transcription — Substitution"
        description: "Replace specific words with alternatives while preserving prosody and speaker identity."
        instruction_col: true
        samples:
          - id: sub_001
            instruction: 'Replace "nothing" with "everything"'
            text: "but anders cared nothing about that"
            audios:
              source:        "audios/speech/transcription_sub/sub_001_source.wav"
              bagpiper_base: "audios/speech/transcription_sub/sub_001_bagpiper_base.wav"
              bagpiper_st:   "audios/speech/transcription_sub/sub_001_bagpiper_st.wav"
              bagpiper_mt:   "audios/speech/transcription_sub/sub_001_bagpiper_mt.wav"

      # --- Transcription: Replace Sentence ---
      - id: transcription_replace_sentence
        title: "Transcription — Replace Sentence"
        description: "Replace the entire spoken sentence with a new one, keeping the same speaker voice."
        instruction_col: true
        samples:
          - id: rep_001
            instruction: 'Replace with "The weather is beautiful today."'
            text: "but anders cared nothing about that"
            audios:
              source:        "audios/speech/transcription_replace/rep_001_source.wav"
              bagpiper_base: "audios/speech/transcription_replace/rep_001_bagpiper_base.wav"
              bagpiper_st:   "audios/speech/transcription_replace/rep_001_bagpiper_st.wav"
              bagpiper_mt:   "audios/speech/transcription_replace/rep_001_bagpiper_mt.wav"

      # --- Paralinguistic ---
      - id: paralinguistic
        title: "Paralinguistic Editing"
        description: "Add or modify paralinguistic elements such as laughter, breathing, hesitation, etc."
        instruction_col: true
        samples:
          - id: para_001
            instruction: 'Add [Laughter] after "that"'
            text: "but anders cared nothing about that"
            audios:
              source:        "audios/speech/paralinguistic/para_001_source.wav"
              bagpiper_base: "audios/speech/paralinguistic/para_001_bagpiper_base.wav"
              bagpiper_st:   "audios/speech/paralinguistic/para_001_bagpiper_st.wav"
              bagpiper_mt:   "audios/speech/paralinguistic/para_001_bagpiper_mt.wav"

