              source:        "audios/speech/emotion/emo_001_source.wav"
              bagpiper_base: "audios/speech/emotion/emo_001_bagpiper_base.wav"
              bagpiper_st:   "audios/speech/emotion/emo_001_bagpiper_st.wav"
              bagpiper_mt:   "audios/speech/emotion/emo_001_bagpiper_mt.wav"

